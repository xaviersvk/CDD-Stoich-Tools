<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>CDD Stoich Tools</title>
    <link rel="stylesheet" href="./popup.css" />
</head>
<body>
<main class="popup">
    <h1>CDD Stoich Tools</h1>

    <label for="elnTitleMode">ELN tab title</label>
    <select id="elnTitleMode">
        <option value="original">Original CDD title</option>
        <option value="title-only">ELN title only</option>
        <option value="id-title">Entry ID + ELN title</option>
    </select>

    <p class="hint">
        Default: Entry ID + ELN title.
    </p>
</main>

<script src="./popup.js"></script>
</body>
</html>
