name: Publish to Chrome Web Store

# Runs when you push a version tag (e.g. v9.3.0), which is exactly the last step
# of the existing release workflow. Also runnable manually from the Actions tab.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   CHROME_EXTENSION_ID     the Item ID of the extension in the Web Store
#   CHROME_CLIENT_ID        OAuth client ID   (Chrome Web Store API)
#   CHROME_CLIENT_SECRET    OAuth client secret
#   CHROME_REFRESH_TOKEN    OAuth refresh token
#
# Optional repository variable:
#   CHROME_AUTOPUBLISH      set to "false" to upload as draft only (no publish)
#
# See DEPLOYMENT.md for the one-time Google-side setup.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish after upload (uncheck to upload as draft only)"
        type: boolean
        default: true

concurrency:
  group: chrome-web-store-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
      CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
      CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
      CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Verify required secrets are present
        run: |
          missing=""
          for name in CHROME_EXTENSION_ID CHROME_CLIENT_ID CHROME_CLIENT_SECRET CHROME_REFRESH_TOKEN; do
            if [ -z "${!name}" ]; then
              missing="$missing $name"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing required secret(s):$missing — see DEPLOYMENT.md"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check manifest version matches the tag
        if: github.event_name == 'push'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest="$(node -p "require('./manifest.json').version")"
          echo "Tag version:      $tag"
          echo "Manifest version: $manifest"
          if [ "$tag" != "$manifest" ]; then
            echo "::error::Tag ($tag) does not match manifest.json version ($manifest)."
            exit 1
          fi

      - name: Package dist into a zip
        run: |
          cd dist
          zip -r -X ../extension.zip . >/dev/null
          cd ..
          echo "Packaged $(du -h extension.zip | cut -f1) zip"

      - name: Get access token
        run: |
          response="$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d client_id="$CHROME_CLIENT_ID" \
            -d client_secret="$CHROME_CLIENT_SECRET" \
            -d refresh_token="$CHROME_REFRESH_TOKEN" \
            -d grant_type=refresh_token)"
          token="$(echo "$response" | jq -r '.access_token // empty')"
          if [ -z "$token" ]; then
            echo "::error::Could not obtain access token. Response: $response"
            exit 1
          fi
          echo "::add-mask::$token"
          echo "ACCESS_TOKEN=$token" >> "$GITHUB_ENV"

      - name: Upload package
        run: |
          response="$(curl -s -X PUT \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -T extension.zip \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/$CHROME_EXTENSION_ID")"
          echo "$response"
          state="$(echo "$response" | jq -r '.uploadState // empty')"
          if [ "$state" != "SUCCESS" ]; then
            echo "::error::Upload failed (uploadState=$state)."
            exit 1
          fi

      - name: Publish
        if: >-
          (github.event_name == 'workflow_dispatch' && inputs.publish) ||
          (github.event_name == 'push' && vars.CHROME_AUTOPUBLISH != 'false')
        run: |
          response="$(curl -s -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/$CHROME_EXTENSION_ID/publish")"
          echo "$response"
          status="$(echo "$response" | jq -r '.status[0] // empty')"
          case "$status" in
            OK|PUBLISHED)
              echo "Published; Google review may take a while before it goes live." ;;
            *)
              echo "::error::Publish did not return OK. Response above."
              exit 1 ;;
          esac

      - name: Draft-only notice
        if: >-
          (github.event_name == 'workflow_dispatch' && !inputs.publish) ||
          (github.event_name == 'push' && vars.CHROME_AUTOPUBLISH == 'false')
        run: echo "Uploaded as a draft only (publish skipped). Publish it from the Web Store dashboard."
