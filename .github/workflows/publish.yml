name: Publish extension

# Runs when you push a version tag (e.g. v9.3.0), the last step of the release
# workflow. Also runnable manually from the Actions tab.
#
# It builds once, then publishes to the Chrome Web Store and to Firefox AMO.
# Each store is skipped (job stays green) if its secrets aren't configured, so
# you can set up one store at a time.
#
# Chrome secrets (Settings -> Secrets and variables -> Actions):
#   CHROME_EXTENSION_ID, CHROME_PUBLISHER_ID, CHROME_SERVICE_ACCOUNT_JSON
# Firefox / AMO secrets:
#   AMO_JWT_ISSUER, AMO_JWT_SECRET
# Optional repository variable:
#   CHROME_AUTOPUBLISH   set to "false" to upload the Chrome package as a draft
#                        only (no publish). Firefox always submits to AMO review.
#
# See DEPLOYMENT.md for the one-time Google/Mozilla setup.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish after upload (uncheck to upload the Chrome package as a draft only)"
        type: boolean
        default: true

concurrency:
  group: publish-extension
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check manifest version matches the tag
        if: github.event_name == 'push'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest="$(node -p "require('./manifest.json').version")"
          echo "Tag version:      $tag"
          echo "Manifest version: $manifest"
          if [ "$tag" != "$manifest" ]; then
            echo "::error::Tag ($tag) does not match manifest.json version ($manifest)."
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist
          retention-days: 1

  # A GitHub Release per tag, its body taken from RELEASES.md — the same text
  # the public "What's new" page renders. Fails if the tag has no section there.
  github-release:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Extract the notes for this tag
        run: node scripts/notes-for-tag.mjs "$GITHUB_REF_NAME" > release-notes.md

      - name: Create the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "::notice::Release $GITHUB_REF_NAME already exists — updating its notes."
            gh release edit "$GITHUB_REF_NAME" --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file release-notes.md
          fi

  chrome:
    needs: build
    runs-on: ubuntu-latest
    env:
      CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
      CHROME_PUBLISHER_ID: ${{ secrets.CHROME_PUBLISHER_ID }}
    steps:
      - name: Check for Chrome secrets
        id: check
        env:
          CHROME_SERVICE_ACCOUNT_JSON: ${{ secrets.CHROME_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$CHROME_EXTENSION_ID" ] || [ -z "$CHROME_PUBLISHER_ID" ] \
             || [ -z "$CHROME_SERVICE_ACCOUNT_JSON" ]; then
            echo "::notice::Chrome Web Store secrets not set — skipping. See DEPLOYMENT.md."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download build artifact
        if: steps.check.outputs.configured == 'true'
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist

      - name: Package dist into a zip
        if: steps.check.outputs.configured == 'true'
        run: |
          # dist/manifest.json is already the Chrome manifest; the Firefox one
          # rides along in the artifact and must not reach the Web Store.
          rm -f dist/manifest.firefox.json
          cd dist
          zip -r -X ../extension.zip . >/dev/null
          cd ..
          echo "Packaged $(du -h extension.zip | cut -f1) zip"

      - name: Get access token (service account)
        if: steps.check.outputs.configured == 'true'
        env:
          CHROME_SERVICE_ACCOUNT_JSON: ${{ secrets.CHROME_SERVICE_ACCOUNT_JSON }}
        run: |
          # Exchange a self-signed JWT for an access token — needs only the
          # JSON key, no IAM Credentials API or extra roles.
          b64url() { openssl base64 -A | tr '+/' '-_' | tr -d '='; }
          client_email="$(echo "$CHROME_SERVICE_ACCOUNT_JSON" | jq -r .client_email)"
          echo "$CHROME_SERVICE_ACCOUNT_JSON" | jq -r .private_key > sa-key.pem
          now="$(date +%s)"
          claims="$(jq -nc --arg iss "$client_email" --argjson iat "$now" \
            '{iss:$iss, scope:"https://www.googleapis.com/auth/chromewebstore",
              aud:"https://oauth2.googleapis.com/token", iat:$iat, exp:($iat+3600)}')"
          signing_input="$(printf '%s' '{"alg":"RS256","typ":"JWT"}' | b64url).$(printf '%s' "$claims" | b64url)"
          signature="$(printf '%s' "$signing_input" | openssl dgst -sha256 -sign sa-key.pem -binary | b64url)"
          rm -f sa-key.pem
          response="$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer \
            -d assertion="$signing_input.$signature")"
          token="$(echo "$response" | jq -r '.access_token // empty')"
          if [ -z "$token" ]; then
            echo "::error::Could not obtain access token. Response: $response"
            exit 1
          fi
          echo "::add-mask::$token"
          echo "ACCESS_TOKEN=$token" >> "$GITHUB_ENV"

      - name: Upload package
        if: steps.check.outputs.configured == 'true'
        run: |
          item="publishers/$CHROME_PUBLISHER_ID/items/$CHROME_EXTENSION_ID"
          response="$(curl -s -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -T extension.zip \
            "https://chromewebstore.googleapis.com/upload/v2/$item:upload")"
          echo "$response"
          state="$(echo "$response" | jq -r '.uploadState // empty')"
          # A large package may keep processing after the request returns.
          tries=0
          while [ "$state" = "IN_PROGRESS" ] && [ "$tries" -lt 30 ]; do
            sleep 10
            tries=$((tries + 1))
            state="$(curl -s -H "Authorization: Bearer $ACCESS_TOKEN" \
              "https://chromewebstore.googleapis.com/v2/$item:fetchStatus" \
              | jq -r '.lastAsyncUploadState // empty')"
            echo "Upload state after ${tries}0s: $state"
          done
          if [ "$state" != "SUCCEEDED" ]; then
            echo "::error::Upload failed (uploadState=$state)."
            exit 1
          fi

      - name: Publish
        if: >-
          steps.check.outputs.configured == 'true' &&
          (
            (github.event_name == 'workflow_dispatch' && inputs.publish) ||
            (github.event_name == 'push' && vars.CHROME_AUTOPUBLISH != 'false')
          )
        run: |
          item="publishers/$CHROME_PUBLISHER_ID/items/$CHROME_EXTENSION_ID"
          response="$(curl -s -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://chromewebstore.googleapis.com/v2/$item:publish")"
          echo "$response"
          state="$(echo "$response" | jq -r '.state // empty')"
          case "$state" in
            PENDING_REVIEW|PUBLISHED|STAGED|PUBLISHED_TO_TESTERS)
              echo "Submitted (state=$state); Google review may take a while before it goes live." ;;
            *)
              echo "::error::Publish did not succeed (state=$state). Response above."
              exit 1 ;;
          esac

      - name: Draft-only notice
        if: >-
          steps.check.outputs.configured == 'true' &&
          (
            (github.event_name == 'workflow_dispatch' && !inputs.publish) ||
            (github.event_name == 'push' && vars.CHROME_AUTOPUBLISH == 'false')
          )
        run: echo "Uploaded as a draft only (publish skipped). Publish it from the Web Store dashboard."

  firefox:
    needs: build
    runs-on: ubuntu-latest
    env:
      AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
      AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
    steps:
      - name: Check for AMO secrets
        id: check
        run: |
          if [ -z "$AMO_JWT_ISSUER" ] || [ -z "$AMO_JWT_SECRET" ]; then
            echo "::notice::Firefox AMO secrets not set — skipping. See DEPLOYMENT.md."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out
        if: steps.check.outputs.configured == 'true'
        uses: actions/checkout@v5

      - name: Download build artifact
        if: steps.check.outputs.configured == 'true'
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist

      - name: Use the Firefox manifest
        if: steps.check.outputs.configured == 'true'
        run: |
          # Firefox MV3 has no background.service_worker; it needs
          # background.scripts, which in turn Chrome rejects. The build emits
          # both manifests — swap the Firefox one in before signing.
          test -f dist/manifest.firefox.json
          mv dist/manifest.firefox.json dist/manifest.json
          node -p "'Firefox background: ' + JSON.stringify(require('./dist/manifest.json').background)"

      - name: Package source code for AMO review
        if: steps.check.outputs.configured == 'true'
        run: |
          git archive --format=zip --output=source.zip HEAD
          echo "Packaged $(du -h source.zip | cut -f1) source zip"

      - name: Set up Node.js
        if: steps.check.outputs.configured == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Sign and submit to AMO (listed)
        if: steps.check.outputs.configured == 'true'
        run: |
          npx --yes web-ext@latest sign \
            --channel=listed \
            --api-key="$AMO_JWT_ISSUER" \
            --api-secret="$AMO_JWT_SECRET" \
            --source-dir=dist \
            --upload-source-code=source.zip \
            --artifacts-dir=web-ext-artifacts
