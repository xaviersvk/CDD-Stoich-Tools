name: What's new page

# Builds the public release-notes page from RELEASES.md and deploys it to
# GitHub Pages: https://xaviersvk.github.io/CDD-Stoich-Tools/
#
# RELEASES.md is the only source; scripts/build-releases-page.mjs renders it.
# The same file also becomes the body of each GitHub Release (publish.yml), so
# writing the notes once is enough.

# Deploys only ever run from main — that is what the `github-pages` environment
# allows, and it keeps one branch answerable for what is published.
#
# A new tag still has to rebuild the page, because the page names the newest
# TAGGED version ("v11.1.0 in the stores") and moves the Latest badge onto it.
# Rather than trigger on the tag (whose ref the environment would refuse),
# publish.yml calls this workflow on main once the release is cut. The tag points
# at a main commit, so the content is identical, and `fetch-depth: 0` means the
# build can see the tag that was just pushed.
on:
  push:
    branches: [main]
    paths:
      - RELEASES.md
      - manifest.json
      - scripts/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never let two deploys race; queue instead of cancelling a half-finished one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v5
        with:
          # The page reads the shipping version off the newest version tag, not
          # off manifest.json — a shallow clone has no tags.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Build the page
        run: node scripts/build-releases-page.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
