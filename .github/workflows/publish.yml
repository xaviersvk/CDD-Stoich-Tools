name: Publish extension

# Runs when you push a version tag (e.g. v9.3.0), the last step of the release
# workflow. Also runnable manually from the Actions tab.
#
# It builds once, then publishes to the Chrome Web Store and to Firefox AMO.
# Each store is skipped (job stays green) if its secrets aren't configured, so
# you can set up one store at a time.
#
# Chrome secrets (Settings -> Secrets and variables -> Actions):
#   CHROME_EXTENSION_ID, CHROME_CLIENT_ID, CHROME_CLIENT_SECRET, CHROME_REFRESH_TOKEN
# Firefox / AMO secrets:
#   AMO_JWT_ISSUER, AMO_JWT_SECRET
# Optional repository variable:
#   CHROME_AUTOPUBLISH   set to "false" to upload the Chrome package as a draft
#                        only (no publish). Firefox always submits to AMO review.
#
# See DEPLOYMENT.md for the one-time Google/Mozilla setup.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish after upload (uncheck to upload the Chrome package as a draft only)"
        type: boolean
        default: true

concurrency:
  group: publish-extension
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check manifest version matches the tag
        if: github.event_name == 'push'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest="$(node -p "require('./manifest.json').version")"
          echo "Tag version:      $tag"
          echo "Manifest version: $manifest"
          if [ "$tag" != "$manifest" ]; then
            echo "::error::Tag ($tag) does not match manifest.json version ($manifest)."
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1

  chrome:
    needs: build
    runs-on: ubuntu-latest
    env:
      CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
      CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
      CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
      CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
    steps:
      - name: Check for Chrome secrets
        id: check
        run: |
          if [ -z "$CHROME_EXTENSION_ID" ] || [ -z "$CHROME_CLIENT_ID" ] \
             || [ -z "$CHROME_CLIENT_SECRET" ] || [ -z "$CHROME_REFRESH_TOKEN" ]; then
            echo "::notice::Chrome Web Store secrets not set — skipping. See DEPLOYMENT.md."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download build artifact
        if: steps.check.outputs.configured == 'true'
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Package dist into a zip
        if: steps.check.outputs.configured == 'true'
        run: |
          cd dist
          zip -r -X ../extension.zip . >/dev/null
          cd ..
          echo "Packaged $(du -h extension.zip | cut -f1) zip"

      - name: Get access token
        if: steps.check.outputs.configured == 'true'
        run: |
          response="$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d client_id="$CHROME_CLIENT_ID" \
            -d client_secret="$CHROME_CLIENT_SECRET" \
            -d refresh_token="$CHROME_REFRESH_TOKEN" \
            -d grant_type=refresh_token)"
          token="$(echo "$response" | jq -r '.access_token // empty')"
          if [ -z "$token" ]; then
            echo "::error::Could not obtain access token. Response: $response"
            exit 1
          fi
          echo "::add-mask::$token"
          echo "ACCESS_TOKEN=$token" >> "$GITHUB_ENV"

      - name: Upload package
        if: steps.check.outputs.configured == 'true'
        run: |
          response="$(curl -s -X PUT \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -T extension.zip \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/$CHROME_EXTENSION_ID")"
          echo "$response"
          state="$(echo "$response" | jq -r '.uploadState // empty')"
          if [ "$state" != "SUCCESS" ]; then
            echo "::error::Upload failed (uploadState=$state)."
            exit 1
          fi

      - name: Publish
        if: >-
          steps.check.outputs.configured == 'true' &&
          (
            (github.event_name == 'workflow_dispatch' && inputs.publish) ||
            (github.event_name == 'push' && vars.CHROME_AUTOPUBLISH != 'false')
          )
        run: |
          response="$(curl -s -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/$CHROME_EXTENSION_ID/publish")"
          echo "$response"
          status="$(echo "$response" | jq -r '.status[0] // empty')"
          case "$status" in
            OK|PUBLISHED)
              echo "Published; Google review may take a while before it goes live." ;;
            *)
              echo "::error::Publish did not return OK. Response above."
              exit 1 ;;
          esac

      - name: Draft-only notice
        if: >-
          steps.check.outputs.configured == 'true' &&
          (
            (github.event_name == 'workflow_dispatch' && !inputs.publish) ||
            (github.event_name == 'push' && vars.CHROME_AUTOPUBLISH == 'false')
          )
        run: echo "Uploaded as a draft only (publish skipped). Publish it from the Web Store dashboard."

  firefox:
    needs: build
    runs-on: ubuntu-latest
    env:
      AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
      AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
    steps:
      - name: Check for AMO secrets
        id: check
        run: |
          if [ -z "$AMO_JWT_ISSUER" ] || [ -z "$AMO_JWT_SECRET" ]; then
            echo "::notice::Firefox AMO secrets not set — skipping. See DEPLOYMENT.md."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download build artifact
        if: steps.check.outputs.configured == 'true'
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Set up Node.js
        if: steps.check.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sign and submit to AMO (listed)
        if: steps.check.outputs.configured == 'true'
        run: |
          npx --yes web-ext@latest sign \
            --channel=listed \
            --api-key="$AMO_JWT_ISSUER" \
            --api-secret="$AMO_JWT_SECRET" \
            --source-dir=dist \
            --artifacts-dir=web-ext-artifacts
